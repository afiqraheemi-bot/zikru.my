<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#11201C">
<meta name="description" content="zikru.my ialah webapp zikir harian dengan kaunter umum, target khusus, wirid berkumpulan, tema siang/malam, dan simpanan offline.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="zikru">
<title>zikru.my — Zikir Harian</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="assets/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="assets/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#11201C;
    --ink-elev:#1B2E28;
    --ink-elev-2:#213730;
    --parchment:#ECE6D6;
    --parchment-dim:rgba(236,230,214,0.5);
    --parchment-faint:rgba(236,230,214,0.14);
    --gold:#C4923D;
    --gold-glow:rgba(196,146,61,0.35);
    --sage:#3C5148;
    --sage-dim:#243830;
    --divider:rgba(236,230,214,0.08);
    --card-border:rgba(196,146,61,0.12);
    --theme-icon-transition:0.35s ease;
  }
  .device[data-theme="day"]{
    --ink:#E9EDE4;
    --ink-elev:#DEE4D6;
    --ink-elev-2:#D2DAC7;
    --parchment:#20302A;
    --parchment-dim:rgba(32,48,42,0.58);
    --parchment-faint:rgba(32,48,42,0.08);
    --gold:#A9761F;
    --gold-glow:rgba(169,118,31,0.25);
    --sage:#8FA48F;
    --sage-dim:#CDD8C6;
    --divider:rgba(32,48,42,0.1);
    --card-border:rgba(169,118,31,0.16);
  }
  .device, .device *{ transition:background-color var(--theme-icon-transition), color var(--theme-icon-transition), border-color var(--theme-icon-transition), fill var(--theme-icon-transition), box-shadow var(--theme-icon-transition); }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:#0A1512;}
  body{
    font-family:'Manrope',sans-serif;
    display:flex; justify-content:center; align-items:flex-start;
    min-height:100vh; padding:24px 12px;
  }
  .device{
    width:100%; max-width:390px;
    background:var(--ink);
    border-radius:32px;
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,0.5);
    position:relative;
    min-height:780px;
    display:flex; flex-direction:column;
  }
  .screen{ flex:1; display:none; flex-direction:column; padding:22px 20px 0; position:relative;}
  .screen.active{display:flex;}

  .stars{
    position:absolute; inset:0; pointer-events:none;
    background-image:
      radial-gradient(1.6px 1.6px at 18% 9%, rgba(236,230,214,0.4), transparent),
      radial-gradient(1px 1px at 52% 6%, rgba(236,230,214,0.28), transparent),
      radial-gradient(1.4px 1.4px at 78% 13%, rgba(196,146,61,0.32), transparent),
      radial-gradient(1px 1px at 33% 16%, rgba(236,230,214,0.22), transparent),
      radial-gradient(1.6px 1.6px at 64% 20%, rgba(236,230,214,0.3), transparent),
      radial-gradient(1px 1px at 10% 24%, rgba(236,230,214,0.2), transparent),
      radial-gradient(1.4px 1.4px at 88% 27%, rgba(196,146,61,0.26), transparent),
      radial-gradient(1px 1px at 44% 29%, rgba(236,230,214,0.18), transparent),
      radial-gradient(1.2px 1.2px at 25% 34%, rgba(236,230,214,0.16), transparent),
      radial-gradient(1px 1px at 70% 33%, rgba(236,230,214,0.15), transparent);
  }

  /* ---------- Sheet: Tambah/Edit Target ---------- */
  .sheet-overlay{
    position:absolute; inset:0; background:rgba(0,0,0,0.5);
    opacity:0; pointer-events:none; transition:opacity 0.25s ease;
    z-index:20;
  }
  .sheet-overlay.open{ opacity:1; pointer-events:auto; }
  .sheet{
    position:absolute; left:0; right:0; bottom:0;
    background:var(--ink-elev);
    border-radius:24px 24px 0 0;
    padding:10px 20px 26px;
    transform:translateY(100%);
    transition:transform 0.3s cubic-bezier(.22,.68,0,1.01);
    box-shadow:0 -20px 50px rgba(0,0,0,0.35);
  }
  .sheet-overlay.open .sheet{ transform:translateY(0); }
  .sheet-handle{ width:36px; height:4px; border-radius:4px; background:var(--card-border); margin:0 auto 16px; }
  .sheet-title{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:17px; color:var(--parchment); margin-bottom:16px; }
  .type-toggle{ display:flex; gap:8px; margin-bottom:18px; }
  .type-opt{
    flex:1; text-align:center; font-size:12.5px; font-weight:700; color:var(--parchment-dim);
    background:var(--parchment-faint); border:1px solid transparent;
    padding:10px 4px; border-radius:12px; cursor:pointer; font-family:inherit;
  }
  .type-opt.active{ color:var(--gold); border-color:var(--gold); background:var(--card-border); }
  .wirid-item-row{ display:flex; gap:8px; margin-bottom:10px; align-items:center; }
  .wirid-item-row .sheet-input{ margin-bottom:0; }
  .wirid-item-name{ flex:1.6; }
  .wirid-item-num{ flex:1; text-align:center; }
  .wirid-item-remove{
    width:36px; height:36px; flex:0 0 auto; border-radius:10px; border:none;
    background:var(--parchment-faint); color:var(--parchment-dim); cursor:pointer; font-size:14px; font-family:inherit;
  }
  .btn-add-item{
    width:100%; text-align:center; font-size:12.5px; font-weight:700; color:var(--gold);
    background:none; border:1.5px dashed var(--card-border); padding:10px 0; border-radius:12px;
    cursor:pointer; font-family:inherit; margin-bottom:18px;
  }
  .field-label{ font-size:11.5px; font-weight:600; color:var(--parchment-dim); margin-bottom:8px; letter-spacing:0.03em; }
  .preset-chips{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
  .preset-chip{
    font-size:12px; font-weight:600; color:var(--parchment-dim);
    background:var(--parchment-faint); border:1px solid transparent;
    padding:7px 12px; border-radius:100px; cursor:pointer;
  }
  .preset-chip.selected{ color:var(--gold); border-color:var(--gold); background:var(--card-border); }
  .sheet-input{
    width:100%; background:var(--ink); border:1px solid var(--card-border);
    color:var(--parchment); font-family:'Manrope',sans-serif; font-weight:600; font-size:15px;
    padding:12px 14px; border-radius:12px; outline:none; margin-bottom:18px;
  }
  .sheet-input:focus{ border-color:var(--gold); }
  .quick-numbers{ display:flex; gap:8px; margin-bottom:10px; }
  .quick-num{
    flex:1; text-align:center; font-size:12.5px; font-weight:700; color:var(--parchment-dim);
    background:var(--parchment-faint); border:1px solid transparent;
    padding:9px 0; border-radius:10px; cursor:pointer;
  }
  .quick-num.selected{ color:var(--gold); border-color:var(--gold); background:var(--card-border); }
  .num-input{ text-align:center; font-family:'Space Grotesk',sans-serif; font-size:20px; }
  .sheet-actions{ display:flex; gap:10px; margin-top:6px; }
  .btn-primary{
    flex:1; background:var(--gold); color:#1A130A; font-weight:700; font-size:14px;
    padding:13px 0; border-radius:12px; border:none; cursor:pointer; font-family:inherit;
  }
  .btn-ghost{
    background:none; color:var(--parchment-dim); font-weight:600; font-size:13.5px;
    padding:13px 16px; border:none; cursor:pointer; font-family:inherit;
  }
  .btn-danger{ color:#C4593D; }
  .tc-edit{
    position:absolute; top:8px; right:8px; width:22px; height:22px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:var(--parchment-faint); color:var(--parchment-dim); cursor:pointer;
  }
  .tc-edit svg{ width:11px; height:11px; }
  .target-card-add{
    flex:0 0 auto; min-width:64px;
    display:flex; align-items:center; justify-content:center;
    background:none; border:1.5px dashed var(--card-border);
    border-radius:16px; cursor:pointer; color:var(--gold);
  }
  .target-card-add svg{ width:18px; height:18px; }

  header.topbar{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:6px;
  }
  .header-actions{ display:flex; align-items:center; gap:8px; }
  .wordmark{
    font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px;
    color:var(--parchment); letter-spacing:0.02em;
  }
  .wordmark span{color:var(--gold);}
  .icon-btn{
    width:34px;height:34px;border-radius:50%;
    background:var(--parchment-faint);
    display:flex;align-items:center;justify-content:center;
    color:var(--parchment-dim); cursor:pointer; border:none;
  }
  .icon-btn svg{width:16px;height:16px;}
  .icon-btn.muted{ color:var(--gold); background:var(--card-border); }

  /* ---------- Zikir Umum ---------- */
  .tap-wrap{
    flex:1; display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .bead-ring{ position:absolute; width:280px; height:280px; pointer-events:none; }
  .bead-ring .bead{
    position:absolute; width:5px; height:5px; border-radius:50%;
    background:var(--sage-dim); left:50%; top:50%;
    transform-origin:0 0;
  }
  .tap-circle{
    width:clamp(176px, 56vw, 220px); height:clamp(176px, 56vw, 220px); border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--ink-elev-2), var(--ink-elev) 70%);
    border:1px solid var(--card-border);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    cursor:pointer; user-select:none; -webkit-user-select:none;
    touch-action:manipulation;
    -webkit-touch-callout:none;
    padding:0; outline:none; font-family:inherit;
    position:relative;
    transition:transform 0.08s ease, box-shadow 0.2s ease;
    box-shadow:0 0 0 0 var(--gold-glow);
  }
  .hold-ring{
    position:absolute; inset:-6px; border-radius:50%;
    border:2px solid var(--gold); opacity:0; transform:scale(0.9);
    pointer-events:none;
  }
  .tap-circle.holding .hold-ring{
    opacity:1; transform:scale(1.05);
    transition:opacity 0.55s linear, transform 0.55s linear;
  }
  .tap-circle:active{ transform:scale(0.96); }
  .tap-circle.pulse{ box-shadow:0 0 0 14px transparent; }
  .count-num{
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:clamp(40px, 12.5vw, 52px);
    color:var(--parchment); line-height:1;
    font-variant-numeric:tabular-nums;
  }
  .count-label{
    font-size:12px; color:var(--parchment-dim); margin-top:6px; letter-spacing:0.04em;
  }
  .hint{
    text-align:center; color:var(--parchment-dim); font-size:12px;
    padding:18px 0 26px;
  }
  .toast{
    position:absolute; left:50%; top:14px; transform:translateX(-50%) translateY(-140%);
    background:var(--gold); color:#1A130A; font-weight:700; font-size:12.5px;
    padding:8px 16px; border-radius:100px; opacity:0;
    pointer-events:none;
    transition:transform 0.25s ease, opacity 0.25s ease;
    white-space:nowrap;
  }
  .toast.show{ transform:translateX(-50%) translateY(0%); opacity:1; }

  /* ---------- Zikir Khusus ---------- */
  .target-select{
    align-self:center; margin-top:6px;
    display:flex; align-items:center; gap:6px;
    cursor:pointer; user-select:none;
  }
  .target-select .tname{
    font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:19px; color:var(--parchment);
  }
  .target-select svg{width:13px;height:13px;color:var(--gold);}
  .step-indicator{
    text-align:center; font-size:12px; font-weight:600; color:var(--gold);
    margin-top:4px; display:none;
  }

  .ring-wrap{ flex:1; display:flex; align-items:center; justify-content:center; position:relative;}
  .ring-wrap::before{
    content:''; position:absolute; width:480px; height:480px; border-radius:50%;
    background:radial-gradient(circle, rgba(196,146,61,0.09) 0%, rgba(196,146,61,0.03) 45%, rgba(196,146,61,0) 72%);
    pointer-events:none;
  }
  .progress-ring{ position:relative; width:clamp(206px, 64vw, 250px); height:clamp(206px, 64vw, 250px); }
  .progress-ring svg{ width:100%; height:100%; }
  .ring-bead{ transition: fill var(--theme-icon-transition), opacity 0.25s ease; }
  .ring-bead.filled{ fill:var(--gold); opacity:1; }
  .ring-bead.unfilled{ fill:var(--sage); opacity:0.55; }
  .ring-center{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    cursor:pointer; touch-action:manipulation; -webkit-user-select:none; user-select:none;
    background:none; border:none; padding:0; outline:none; font-family:inherit;
  }
  .ring-current{
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:clamp(34px, 10.5vw, 44px); color:var(--parchment);
    font-variant-numeric:tabular-nums; line-height:1;
  }
  .ring-target{ font-size:13px; color:var(--parchment-dim); margin-top:4px; }
  .ring-done{ display:none; text-align:center; }
  .ring-done .check{ font-size:30px; color:var(--gold); }
  .ring-done .label{ font-size:12.5px; color:var(--parchment-dim); margin-top:4px; }
  .ring-step-done{ display:none; text-align:center; }
  .ring-step-done .check{ font-size:28px; color:var(--gold); }
  .ring-step-done .label{ font-size:13px; font-weight:700; color:var(--parchment); margin-top:4px; }
  .ring-step-done .tap-hint{ font-size:11px; color:var(--parchment-dim); margin-top:6px; }

  .subhint{ text-align:center; font-size:11px; color:var(--parchment-dim); margin-top:0; }

  .target-list{
    display:flex; align-items:stretch; gap:10px; margin-top:16px; margin-bottom:44px; padding-bottom:2px; overflow-x:auto;
  }
  .target-card{
    position:relative;
    flex:0 0 auto; min-width:118px; max-width:152px;
    background:var(--ink-elev); border:1px solid var(--card-border);
    border-radius:16px; padding:12px 14px; cursor:pointer;
    text-align:left; font-family:inherit; outline:none;
    box-shadow:0 8px 20px rgba(0,0,0,0.28), 0 1px 0 rgba(236,230,214,0.03) inset;
  }
  .target-card.active{ border-color:var(--gold); background:var(--ink-elev-2); box-shadow:0 8px 22px rgba(196,146,61,0.16), 0 1px 0 rgba(236,230,214,0.03) inset; }
  .target-card.completed{ opacity:0.6; }
  .target-card.completed.active{ opacity:1; }
  .tc-check{ color:var(--gold); font-weight:700; }
  .target-card .tc-name{ font-size:12px; font-weight:700; color:var(--parchment); margin-bottom:6px; padding-right:20px; line-height:1.3; }
  .target-card .tc-bar{ height:4px; background:var(--sage-dim); border-radius:4px; overflow:hidden; }
  .target-card .tc-fill{ height:100%; background:var(--gold); border-radius:4px; }
  .target-card .tc-num{ font-size:10.5px; color:var(--parchment-dim); margin-top:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
  .tc-segs{ display:flex; gap:4px; }
  .tc-segs .seg{ flex:1; height:4px; border-radius:4px; background:var(--sage-dim); }
  .tc-segs .seg-filled{ background:var(--gold); }

  /* ---------- Bottom nav ---------- */
  .bottomnav{
    display:flex; margin-top:auto; border-top:1px solid var(--divider);
    padding:10px 20px 22px;
  }
  .navitem{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:5px;
    color:var(--parchment-dim); font-size:11px; font-weight:600; cursor:pointer;
  }
  .navitem.active{ color:var(--gold); }
  .navitem .dot{ width:5px;height:5px;border-radius:50%; background:transparent; }
  .navitem.active .dot{ background:var(--gold); }
  /* ---------- App sebenar: full-screen di telefon ---------- */
  @media (max-width: 480px){
    body{ padding:0; }
    .device{
      max-width:none; border-radius:0; min-height:100vh; min-height:100dvh;
      box-shadow:none;
    }
    .screen{ padding-top: calc(16px + env(safe-area-inset-top)); }
    .bottomnav{ padding-bottom: calc(14px + env(safe-area-inset-bottom)); }
    .sheet{ padding-bottom: calc(26px + env(safe-area-inset-bottom)); }
  }

  /* Skrin sempit (contoh: iPhone SE, Android kecil ~360px dan bawah) —
     bead-ring hiasan discale supaya tak sesak dengan tap-circle */
  @media (max-width: 374px){
    .bead-ring{ transform: scale(0.88); }
    .ring-wrap::before{ width:400px; height:400px; }
  }
  @media (max-width: 340px){
    .bead-ring{ transform: scale(0.78); }
    .ring-wrap::before{ width:340px; height:340px; }
  }
</style>
</head>
<body>

<div class="device">

  <!-- SCREEN 1: ZIKIR UMUM -->
  <div class="screen active" id="screen-umum">
    <header class="topbar">
      <div class="wordmark">zik<span>ru</span></div>
      <div class="header-actions">
        <button class="icon-btn theme-toggle" aria-label="Tukar mood siang/malam">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
        <button class="icon-btn" aria-label="Tetapan">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 005 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 5c.14 0 .27 0 .4 0A1.65 1.65 0 0011 3.51V3a2 2 0 014 0v.09c0 .69.4 1.32 1 1.6.14.05.27.09.4.09a1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9c0 .14 0 .27 0 .4.28.6.91 1 1.6 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <div class="tap-wrap">
      <div class="toast" id="resetToast">Disetkan semula</div>
      <div class="bead-ring" id="beadRingUmum"></div>
      <button class="tap-circle" id="tapCircle" type="button">
        <span class="hold-ring" aria-hidden="true"></span>
        <span class="count-num" id="countNum">0</span>
        <span class="count-label">kali</span>
      </button>
    </div>

    <div class="hint">Tahan lama untuk set semula</div>

    <div class="bottomnav">
      <div class="navitem active" data-target="screen-umum"><span class="dot"></span>Umum</div>
      <div class="navitem" data-target="screen-khusus"><span class="dot"></span>Khusus</div>
    </div>
  </div>

  <!-- SCREEN 2: ZIKIR KHUSUS -->
  <div class="screen" id="screen-khusus">
    <div class="stars"></div>
    <header class="topbar">
      <div class="wordmark">zik<span>ru</span></div>
      <div class="header-actions">
        <button class="icon-btn theme-toggle" aria-label="Tukar mood siang/malam">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
        <button class="icon-btn" id="muteBtn" aria-label="Bunyi">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19 5a9 9 0 010 14M15.5 8.5a5 5 0 010 7"/></svg>
        </button>
      </div>
    </header>

    <div class="target-select" id="targetSelect">
      <span class="tname" id="targetName">Selawat</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg>
    </div>
    <div class="step-indicator" id="stepIndicator"></div>

    <div class="ring-wrap">
      <div class="toast" id="wiridToast"></div>
      <div class="progress-ring">
        <svg viewBox="0 0 250 250" id="ringSvg"></svg>
        <button class="ring-center" id="ringCenter" type="button" aria-label="Tambah kiraan">
          <div id="ringLive">
            <div class="ring-current" id="ringCurrent">412</div>
            <div class="ring-target" id="ringTarget">/ 1000</div>
          </div>
          <div class="ring-done" id="ringDone">
            <div class="check">✓</div>
            <div class="label" id="ringDoneLabel">Selesai — Alhamdulillah</div>
          </div>
          <div class="ring-step-done" id="ringStepDone">
            <div class="check">✓</div>
            <div class="label" id="ringStepDoneLabel">Subhanallah selesai</div>
            <div class="tap-hint">Tap untuk sambung</div>
          </div>
        </button>
      </div>
    </div>

<script>
function escapeHtml(value){
  return String(value).replace(/[&<>"']/g, char => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[char]));
}

function escapeAttr(value){
  return escapeHtml(value);
}

// ---------- Storan: data kekal walaupun tutup app ----------
// Nota: bila dibuka dalam preview Claude, storan mungkin disekat (data tak kekal) —
// tapi bila dibuka dalam browser sebenar / Live Server / deploy, ia kekal sepenuhnya.
const RESET_HOUR = 6; // anggaran waktu Subuh; fasa Laravel nanti guna waktu solat sebenar ikut zon
function currentDayKey(){
  const d = new Date();
  if(d.getHours() < RESET_HOUR) d.setDate(d.getDate() - 1);
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
let SAVED = null;
try{ SAVED = JSON.parse(localStorage.getItem('zikru-v1')); }catch(e){ SAVED = null; }
const isNewDay = !SAVED || SAVED.dayKey !== currentDayKey();

function saveState(){
  try{
    localStorage.setItem('zikru-v1', JSON.stringify({
      dayKey: currentDayKey(),
      count, targets, mood, muted
    }));
  }catch(e){ /* storan disekat (contoh: preview) — app tetap jalan, cuma tak kekal */ }
}

// ---------- Day / Night mood ----------
const MOON = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
const SUN = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2.2M12 19.8V22M4.93 4.93l1.55 1.55M17.52 17.52l1.55 1.55M2 12h2.2M19.8 12H22M4.93 19.07l1.55-1.55M17.52 6.48l1.55-1.55"/>';
const deviceEl = document.querySelector('.device');
let mood = (SAVED && SAVED.mood) ? SAVED.mood : 'night';

function applyMood(){
  deviceEl.setAttribute('data-theme', mood);
  document.querySelectorAll('.theme-toggle svg').forEach(svg=>{
    svg.innerHTML = mood === 'day' ? SUN : MOON;
  });
}
document.querySelectorAll('.theme-toggle').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    mood = mood === 'night' ? 'day' : 'night';
    applyMood();
    vibrate(8);
    saveState();
  });
});
applyMood();

// ---------- Nav switching ----------
document.querySelectorAll('.navitem').forEach(item=>{
  item.addEventListener('click',()=>{
    document.querySelectorAll('.navitem').forEach(i=>i.classList.remove('active'));
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll(`[data-target="${item.dataset.target}"]`).forEach(i=>i.classList.add('active'));
    document.getElementById(item.dataset.target).classList.add('active');
  });
});

function vibrate(ms){ if(navigator.vibrate) navigator.vibrate(ms); }

// ---------- Bunyi (fallback untuk iOS yang tak sokong vibration) ----------
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx){
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(!Ctx) return null;
    audioCtx = new Ctx();
  }
  if(audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function beep(freq=880, duration=0.08, volume=0.15, type='sine'){
  try{
    const ctx = getAudioCtx();
    if(!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(volume, ctx.currentTime + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration + 0.02);
  }catch(e){}
}
function beepTick(){ beep(1200, 0.035, 0.07, 'sine'); }
function beepMilestone(){ beep(880, 0.09, 0.15, 'triangle'); setTimeout(()=>beep(1320, 0.12, 0.15, 'triangle'), 90); }
function beepReset(){ beep(320, 0.15, 0.12, 'sine'); }
function beepStepDone(){ beep(700, 0.08, 0.13, 'sine'); }
function beepTargetDone(){ beep(660, 0.1, 0.16, 'triangle'); setTimeout(()=>beep(990, 0.14, 0.16, 'triangle'), 100); }

// ---------- ZIKIR UMUM ----------

let count = (!isNewDay && SAVED && typeof SAVED.count === 'number') ? SAVED.count : 0;
const countNum = document.getElementById('countNum');
countNum.textContent = count.toLocaleString('ms-MY');
const tapCircle = document.getElementById('tapCircle');
let pressTimer = null; let longPressed = false;

// decorative bead ring
const beadRingUmum = document.getElementById('beadRingUmum');
const N_DEC = 60;
for(let i=0;i<N_DEC;i++){
  const b = document.createElement('div');
  b.className='bead';
  const angle = (i/N_DEC)*2*Math.PI;
  const r = 138;
  b.style.transform = `translate(${140+r*Math.cos(angle)-2.5}px, ${140+r*Math.sin(angle)-2.5}px)`;
  beadRingUmum.appendChild(b);
}

function bump(){
  count++;
  countNum.textContent = count.toLocaleString('ms-MY');
  tapCircle.style.transform='scale(0.94)';
  setTimeout(()=>{ tapCircle.style.transform='scale(1)'; }, 90);

  if(count % 100 === 0){
    vibrate([15,40,15,40,15]);
    beepMilestone();
    const toast = document.getElementById('resetToast');
    const original = toast.textContent;
    toast.textContent = count.toLocaleString('ms-MY') + ' kali ✓';
    toast.classList.add('show');
    setTimeout(()=>{
      toast.classList.remove('show');
      setTimeout(()=>{ toast.textContent = original; }, 300);
    }, 900);
  } else {
    vibrate(12);
    beepTick();
  }
  saveState();
}

tapCircle.addEventListener('contextmenu', e=> e.preventDefault());

// Tap utama guna 'click' — sama pattern dengan skrin Khusus yang stabil
tapCircle.addEventListener('click', ()=>{
  if(longPressed){ longPressed = false; return; }
  bump();
});

// Long-press (lapisan tambahan) untuk reset — tak ganggu click di atas
tapCircle.addEventListener('pointerdown', ()=>{
  longPressed = false;
  tapCircle.classList.add('holding');
  pressTimer = setTimeout(()=>{
    longPressed = true;
    tapCircle.classList.remove('holding');
    count = 0;
    countNum.textContent = '0';
    vibrate([20,40,20]);
    beepReset();
    saveState();
    const toast = document.getElementById('resetToast');
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'), 1200);
  }, 600);
});
tapCircle.addEventListener('pointerup', ()=> { clearTimeout(pressTimer); tapCircle.classList.remove('holding'); });
tapCircle.addEventListener('pointerleave', ()=> { clearTimeout(pressTimer); tapCircle.classList.remove('holding'); });
tapCircle.addEventListener('pointercancel', ()=> { clearTimeout(pressTimer); tapCircle.classList.remove('holding'); });

// ---------- ZIKIR KHUSUS ----------
// type 'simple'  = satu zikir, satu target (contoh: Selawat 1000/hari)
// type 'wirid'   = kumpulan beberapa zikir berturutan (contoh: Wirid Pagi -> Subhanallah, Alhamdulillah, Allahuakbar)
const DEFAULT_TARGETS = [
  {type:'simple', name:'Selawat', current:0, target:1000},
  {type:'wirid', name:'Wirid Pagi', items:[
    {name:'Subhanallah', current:0, target:33},
    {name:'Alhamdulillah', current:0, target:33},
    {name:'Allahuakbar', current:0, target:34},
  ]},
  {type:'wirid', name:'Wirid Petang', items:[
    {name:'Subhanallah', current:0, target:33},
    {name:'Alhamdulillah', current:0, target:33},
    {name:'Allahuakbar', current:0, target:34},
  ]},
];
const targets = (SAVED && Array.isArray(SAVED.targets) && SAVED.targets.length) ? SAVED.targets : DEFAULT_TARGETS;
// Hari baru: definisi target kekal, progress semalam di-reset ke 0
if(isNewDay){
  targets.forEach(t=>{
    if(t.type === 'wirid'){ t.items.forEach(it=> it.current = 0); }
    else { t.current = 0; }
  });
}
let activeIdx = 0;
const NS = "http://www.w3.org/2000/svg";
const ringSvg = document.getElementById('ringSvg');
const N_BEADS = 36;
const cx=125, cy=125, r=105;

function isDone(t){
  return t.type === 'wirid' ? t.items.every(it=>it.current>=it.target) : t.current>=t.target;
}
function activeItemOf(t){
  if(t.type !== 'wirid') return null;
  const idx = t.items.findIndex(it=>it.current<it.target);
  return idx === -1 ? t.items[t.items.length-1] : t.items[idx];
}
function wiridDoneCount(t){ return t.items.filter(it=>it.current>=it.target).length; }
// Kalau ada zikir yang baru selesai tapi belum disahkan (tap) untuk sambung,
// tunjuk zikir tu dulu — bukan terus lompat ke zikir seterusnya
function displayItemOf(t){
  if(t.type !== 'wirid') return t;
  if(t.pendingConfirm != null && t.items[t.pendingConfirm]) return t.items[t.pendingConfirm];
  return activeItemOf(t);
}

function buildRing(){
  ringSvg.innerHTML='';
  for(let i=0;i<N_BEADS;i++){
    const angle = (i/N_BEADS)*2*Math.PI - Math.PI/2;
    const x = cx + r*Math.cos(angle);
    const y = cy + r*Math.sin(angle);
    const c = document.createElementNS(NS,'circle');
    c.setAttribute('cx',x); c.setAttribute('cy',y); c.setAttribute('r', i%9===0?5:3.4);
    c.setAttribute('class','ring-bead');
    c.setAttribute('data-i', i);
    ringSvg.appendChild(c);
  }
}
buildRing();

function getDisplayOrder(){
  return targets.map((_, i) => i).sort((a, b)=>{
    const aDone = isDone(targets[a]);
    const bDone = isDone(targets[b]);
    if(aDone === bDone) return a - b;
    return aDone ? 1 : -1;
  });
}

function renderRing(){
  const t = targets[activeIdx];
  const item = displayItemOf(t);
  const pct = Math.min(item.current/item.target, 1);
  const filled = Math.round(pct*N_BEADS);
  document.querySelectorAll('.ring-bead').forEach((c,i)=>{
    c.setAttribute('class', i < filled ? 'ring-bead filled' : 'ring-bead unfilled');
  });

  document.getElementById('targetName').textContent = t.name;
  document.getElementById('ringCurrent').textContent = item.current.toLocaleString('ms-MY');
  document.getElementById('ringTarget').textContent = '/ ' + item.target.toLocaleString('ms-MY');

  const stepIndicator = document.getElementById('stepIndicator');
  const stepPending = t.type === 'wirid' && t.pendingConfirm != null;
  if(t.type === 'wirid'){
    const doneCount = wiridDoneCount(t);
    stepIndicator.style.display = 'block';
    stepIndicator.textContent = stepPending
      ? `${item.name} selesai ✓ · tap untuk sambung`
      : `${item.name} · langkah ${Math.min(doneCount+1, t.items.length)}/${t.items.length}`;
  } else {
    stepIndicator.style.display = 'none';
  }

  const done = isDone(t);
  document.getElementById('ringLive').style.display = (done || stepPending) ? 'none' : 'flex';
  document.getElementById('ringDone').style.display = (done && !stepPending) ? 'block' : 'none';
  document.getElementById('ringStepDone').style.display = stepPending ? 'block' : 'none';
  if(stepPending){
    document.getElementById('ringStepDoneLabel').textContent = `${item.name} selesai`;
  }

  // target list — yang belum siap dulu, yang dah capai target turun ke belakang
  const list = document.getElementById('targetList');
  list.innerHTML='';
  const order = getDisplayOrder();
  order.forEach(i=>{
    const tg = targets[i];
    const done = isDone(tg);
    const card = document.createElement('button');
    card.type = 'button';
    card.className = 'target-card' + (i===activeIdx?' active':'') + (done?' completed':'');
    card.setAttribute('aria-pressed', i===activeIdx ? 'true' : 'false');

    if(tg.type === 'wirid'){
      const dc = wiridDoneCount(tg);
      const currentItem = displayItemOf(tg);
      const segs = tg.items.map(it=> `<span class="seg ${it.current>=it.target?'seg-filled':''}"></span>`).join('');
      card.innerHTML = `
        <div class="tc-edit" data-edit-i="${i}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </div>
        <div class="tc-name">${escapeHtml(tg.name)}${done ? ' <span class="tc-check">✓</span>' : ''}</div>
        <div class="tc-segs">${segs}</div>
        <div class="tc-num">${done ? 'Selesai' : `${escapeHtml(currentItem.name)} · ${dc}/${tg.items.length}`}</div>
      `;
    } else {
      const pctc = Math.min(100, Math.round((tg.current/tg.target)*100));
      card.innerHTML = `
        <div class="tc-edit" data-edit-i="${i}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </div>
        <div class="tc-name">${escapeHtml(tg.name)}${done ? ' <span class="tc-check">✓</span>' : ''}</div>
        <div class="tc-bar"><div class="tc-fill" style="width:${pctc}%"></div></div>
        <div class="tc-num">${done ? 'Selesai' : tg.current + '/' + tg.target}</div>
      `;
    }
    card.addEventListener('click', (e)=>{
      if(e.target.closest('.tc-edit')) return;
      activeIdx=i; renderRing();
    });
    list.appendChild(card);
  });

  const addCard = document.createElement('button');
  addCard.type = 'button';
  addCard.className = 'target-card-add';
  addCard.setAttribute('aria-label','Tambah target baru');
  addCard.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>';
  addCard.addEventListener('click', ()=> openSheet('add'));
  list.appendChild(addCard);

  // pasang listener edit selepas kad dijana (semua jenis kad kini boleh diedit)
  document.querySelectorAll('.tc-edit').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      openSheet('edit', parseInt(btn.dataset.editI));
    });
  });
}
renderRing();
if(isNewDay) saveState(); // rekod dayKey baru supaya reset tak berulang dalam hari sama

document.getElementById('targetSelect').addEventListener('click', ()=>{
  const order = getDisplayOrder();
  const posInOrder = order.indexOf(activeIdx);
  activeIdx = order[(posInOrder + 1) % order.length];
  renderRing();
});

document.getElementById('ringCenter').addEventListener('click', ()=>{
  const t = targets[activeIdx];

  // Ada zikir yang baru selesai, menunggu pengesahan — tap ni cuma sambung, TAK dikira
  if(t.type === 'wirid' && t.pendingConfirm != null){
    t.pendingConfirm = null;
    vibrate(8);
    renderRing();
    saveState();
    return;
  }

  const item = t.type === 'wirid' ? activeItemOf(t) : t;
  if(item.current >= item.target) return;

  item.current++;
  vibrate(12);

  if(item.current >= item.target){
    if(t.type === 'wirid' && wiridDoneCount(t) < t.items.length){
      // satu zikir dalam wirid selesai, tapi wirid belum habis — kunci ring, tunggu tap sahkan
      t.pendingConfirm = t.items.indexOf(item);
      vibrate([25,50,25]);
      if(!muted) beepStepDone();
      const next = activeItemOf(t);
      const toast = document.getElementById('wiridToast');
      toast.textContent = `${item.name} selesai ✓ · tap untuk sambung ke ${next.name}`;
      toast.classList.add('show');
      setTimeout(()=>toast.classList.remove('show'), 1800);
    } else {
      // simple selesai, atau wirid — semua zikir dah habis
      vibrate([30,60,30,60,30]);
      if(!muted) beepTargetDone();
    }
  }
  renderRing();
  saveState();
});

const SOUND_ON = '<path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19 5a9 9 0 010 14M15.5 8.5a5 5 0 010 7"/>';
const SOUND_OFF = '<path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M23 9l-6 6M17 9l6 6"/>';
let muted = SAVED ? !!SAVED.muted : true; // bunyi OFF secara default — user opt-in (keputusan awal projek)
function applyMuteIcon(){
  const btn = document.getElementById('muteBtn');
  const svg = btn.querySelector('svg');
  if(svg) svg.innerHTML = muted ? SOUND_OFF : SOUND_ON;
  btn.classList.toggle('muted', muted);
  btn.setAttribute('aria-label', muted ? 'Bunyi dimatikan — tap untuk hidupkan' : 'Bunyi dihidupkan — tap untuk matikan');
}
applyMuteIcon();
document.getElementById('muteBtn').addEventListener('click', ()=>{
  muted = !muted;
  applyMuteIcon();
  saveState();
});

// ---------- Sheet: Tambah / Edit Target ----------
const sheetOverlay = document.getElementById('sheetOverlay');
const sheetTitle = document.getElementById('sheetTitle');
const typeToggleEl = document.getElementById('typeToggle');
const simpleFieldsEl = document.getElementById('simpleFields');
const wiridFieldsEl = document.getElementById('wiridFields');
const sheetNameInput = document.getElementById('sheetNameInput');
const sheetNumInput = document.getElementById('sheetNumInput');
const wiridNameInput = document.getElementById('wiridNameInput');
const wiridItemsList = document.getElementById('wiridItemsList');
const sheetDeleteBtn = document.getElementById('sheetDelete');
let sheetMode = 'add'; // 'add' | 'edit'
let sheetEditIdx = null;
let sheetTargetType = 'simple'; // 'simple' | 'wirid'

function resetChipSelection(){
  document.querySelectorAll('.preset-chip').forEach(c=>c.classList.remove('selected'));
  document.querySelectorAll('.quick-num').forEach(c=>c.classList.remove('selected'));
}

function setSheetType(type){
  sheetTargetType = type;
  document.querySelectorAll('.type-opt').forEach(b=>{
    const active = b.dataset.type === type;
    b.classList.toggle('active', active);
    b.setAttribute('aria-pressed', active ? 'true' : 'false');
  });
  simpleFieldsEl.style.display = type === 'simple' ? 'block' : 'none';
  wiridFieldsEl.style.display = type === 'wirid' ? 'block' : 'none';
}
document.querySelectorAll('.type-opt').forEach(btn=>{
  btn.addEventListener('click', ()=> setSheetType(btn.dataset.type));
});

function addWiridItemRow(name='', target=''){
  const row = document.createElement('div');
  row.className = 'wirid-item-row';
  row.innerHTML = `
    <input type="text" class="sheet-input wirid-item-name" placeholder="Nama zikir" maxlength="20" value="${escapeAttr(name)}">
    <input type="number" inputmode="numeric" class="sheet-input wirid-item-num" placeholder="Bil." value="${escapeAttr(target)}">
    <button type="button" class="wirid-item-remove" aria-label="Buang zikir ni">✕</button>
  `;
  row.querySelector('.wirid-item-remove').addEventListener('click', ()=>{
    if(wiridItemsList.querySelectorAll('.wirid-item-row').length > 1) row.remove();
  });
  wiridItemsList.appendChild(row);
}
document.getElementById('addWiridItem').addEventListener('click', ()=> addWiridItemRow());

function openSheet(mode, idx){
  sheetMode = mode;
  sheetEditIdx = idx ?? null;
  resetChipSelection();
  wiridItemsList.innerHTML = '';

  if(mode === 'edit'){
    const t = targets[idx];
    sheetTitle.textContent = 'Edit Target';
    typeToggleEl.style.display = 'none'; // jenis tak boleh tukar semasa edit — elak kehilangan data
    sheetDeleteBtn.style.display = targets.length > 1 ? 'block' : 'none';

    if(t.type === 'wirid'){
      setSheetType('wirid');
      wiridNameInput.value = t.name;
      t.items.forEach(it => addWiridItemRow(it.name, it.target));
    } else {
      setSheetType('simple');
      sheetNameInput.value = t.name;
      sheetNumInput.value = t.target;
      const chip = [...document.querySelectorAll('.preset-chip')].find(c=>c.dataset.name===t.name);
      if(chip) chip.classList.add('selected');
      const num = [...document.querySelectorAll('.quick-num')].find(c=>c.dataset.num==String(t.target));
      if(num) num.classList.add('selected');
    }
  } else {
    sheetTitle.textContent = 'Tambah Target';
    typeToggleEl.style.display = 'flex';
    setSheetType('simple');
    sheetNameInput.value = '';
    sheetNumInput.value = '';
    wiridNameInput.value = '';
    addWiridItemRow();
    sheetDeleteBtn.style.display = 'none';
  }
  sheetOverlay.classList.add('open');
}

function closeSheet(){ sheetOverlay.classList.remove('open'); }

document.querySelectorAll('.preset-chip').forEach(chip=>{
  chip.addEventListener('click', ()=>{
    document.querySelectorAll('.preset-chip').forEach(c=>c.classList.remove('selected'));
    chip.classList.add('selected');
    sheetNameInput.value = chip.dataset.name;
  });
});
sheetNameInput.addEventListener('input', ()=>{
  document.querySelectorAll('.preset-chip').forEach(c=>{
    c.classList.toggle('selected', c.dataset.name === sheetNameInput.value);
  });
});

document.querySelectorAll('.quick-num').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.quick-num').forEach(c=>c.classList.remove('selected'));
    btn.classList.add('selected');
    sheetNumInput.value = btn.dataset.num;
  });
});
sheetNumInput.addEventListener('input', ()=>{
  document.querySelectorAll('.quick-num').forEach(c=>{
    c.classList.toggle('selected', c.dataset.num === sheetNumInput.value);
  });
});

document.getElementById('sheetCancel').addEventListener('click', closeSheet);
sheetOverlay.addEventListener('click', (e)=>{ if(e.target === sheetOverlay) closeSheet(); });

document.getElementById('sheetSave').addEventListener('click', ()=>{
  if(sheetTargetType === 'wirid'){
    const groupName = wiridNameInput.value.trim();
    const rows = [...wiridItemsList.querySelectorAll('.wirid-item-row')];
    const parsed = rows.map(row=>({
      name: row.querySelector('.wirid-item-name').value.trim(),
      target: parseInt(row.querySelector('.wirid-item-num').value)
    }));
    const valid = groupName && parsed.length>0 && parsed.every(it=>it.name && it.target>0);
    if(!valid){ vibrate([15,30,15]); return; }

    if(sheetMode === 'add'){
      targets.push({type:'wirid', name:groupName, items: parsed.map(it=>({name:it.name, target:it.target, current:0}))});
      activeIdx = targets.length - 1;
    } else {
      const old = targets[sheetEditIdx];
      const merged = parsed.map(it=>{
        const match = old.items && old.items.find(oi=>oi.name===it.name);
        return {name:it.name, target:it.target, current: match ? Math.min(match.current, it.target) : 0};
      });
      targets[sheetEditIdx] = {type:'wirid', name:groupName, items:merged};
    }
  } else {
    const name = sheetNameInput.value.trim();
    const num = parseInt(sheetNumInput.value);
    if(!name || !num || num < 1){
      vibrate([15,30,15]);
      if(!name) sheetNameInput.focus(); else sheetNumInput.focus();
      return;
    }
    if(sheetMode === 'add'){
      targets.push({type:'simple', name, current:0, target:num});
      activeIdx = targets.length - 1;
    } else {
      const oldCurrent = targets[sheetEditIdx].current || 0;
      targets[sheetEditIdx] = {type:'simple', name, current: Math.min(oldCurrent, num), target:num};
    }
  }
  vibrate(12);
  closeSheet();
  renderRing();
  saveState();
});

sheetDeleteBtn.addEventListener('click', ()=>{
  if(targets.length <= 1) return;
  targets.splice(sheetEditIdx, 1);
  activeIdx = 0;
  closeSheet();
  renderRing();
  saveState();
});

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

</script>

</body>
</html>
